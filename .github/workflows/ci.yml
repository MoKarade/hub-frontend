name: hub-frontend CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-typecheck-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          # Pas de cache: 'npm' — nécessite un package-lock.json qui n'existe pas encore.
          # À réactiver après le premier `npm install` local qui générera le lockfile.
      - name: Install dependencies
        # Retry pour absorber les ECONNRESET transitoires de registry.npmjs.org
        # (vu sur run #5 : tailwindcss aborted mid-fetch).
        run: |
          npm config set fetch-retries 5
          npm config set fetch-retry-maxtimeout 120000
          npm config set fetch-retry-mintimeout 20000
          for i in 1 2 3; do
            if npm install --legacy-peer-deps; then
              exit 0
            fi
            echo "npm install failed (attempt $i/3), retrying in 10s..."
            sleep 10
          done
          exit 1
      - name: Lint
        run: npm run lint
        env:
          ESLINT_USE_FLAT_CONFIG: 'false'
      - name: Typecheck
        run: npm run typecheck
      - name: Build
        run: npm run build
        env:
          # En CI on build sans backend, donc URL relative
          NEXT_PUBLIC_HUB_API_URL: '/api'
