name: hub-frontend CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-typecheck-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          # Pas de cache: 'npm' — nécessite un package-lock.json qui n'existe pas encore.
          # À réactiver après le premier `npm install` local qui générera le lockfile.
      - name: Install dependencies
        run: npm install --legacy-peer-deps
      - name: Lint
        run: npm run lint
        env:
          ESLINT_USE_FLAT_CONFIG: 'false'
      - name: Typecheck
        run: npm run typecheck
      - name: Build
        run: npm run build
        env:
          # En CI on build sans backend, donc URL relative
          NEXT_PUBLIC_HUB_API_URL: '/api'
